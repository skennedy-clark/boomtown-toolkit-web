<header class="uq-shell uq-shell--header">
  <div class="uq-global-bar">
    <div class="container uq-global-bar__inner">
      <a class="uq-logo" href="{{ "/" | relURL }}">{{ .Site.Params.organisationName }}</a>
      <a class="skip-link" href="#main-content">Skip to content</a>
    </div>
  </div>

  <div class="uq-site-bar">
    <div class="container uq-site-bar__inner">
      <div>
        <p class="site-kicker">Research Centre</p>
        <a class="site-title" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
      </div>

      <nav class="primary-nav" aria-label="Main navigation">
        <ul>
          {{ range .Site.Menus.main }}
            <li><a href="{{ .URL }}">{{ .Name }}</a></li>
          {{ end }}
        </ul>
      </nav>
    </div>
  </div>
</header>
